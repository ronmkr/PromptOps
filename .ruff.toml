line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "W", "I", "N", "UP", "B"]
ignore = ["E501"] # Ignore long lines as many templates/logs have them

[lint.isort]
known-first-party = ["promptbook"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
