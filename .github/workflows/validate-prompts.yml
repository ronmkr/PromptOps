name: CI - PromptOps Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  validate-and-test:
    name: Validate and Test PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Makefile Functionality
        run: make help

      - name: Validate Prompt Metadata & Structure
        run: make validate

      - name: Run Code Linting & Formatting Checks
        run: make lint

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "promptops-tui -> target"

      - name: Build Rust TUI (Debug)
        run: cd promptops-tui && cargo build

      - name: Run Rust Unit Tests
        run: cd promptops-tui && cargo test

      - name: Run CLI Helper Tests
        run: make test

      - name: Verify Prompt Catalog Synchronization
        run: |
          make docs
          if [ -n "$(git status --porcelain docs/catalog/ README.md GEMINI.md)" ]; then
            echo "::error::Documentation catalogs or README are out of sync with prompt templates!"
            echo "::notice::Please run 'make docs' locally and commit the changes before merging."
            git diff docs/catalog/ README.md GEMINI.md
            exit 1
          else
            echo "✅ Domain catalogs are up to date."
          fi

  create-tag-on-push:
    name: Tag Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: ""
