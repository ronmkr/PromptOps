name: CI - PromptOps Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  validate-and-test:
    name: Validate and Test PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Makefile Functionality
        run: make help

      - name: Validate Prompt Metadata & Structure
        run: make validate

      - name: Run Code Linting & Formatting Checks
        run: make lint

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "promptops-tui -> target"

      - name: Build Rust TUI (Debug)
        run: cd promptops-tui && cargo build

      - name: Run Rust Unit Tests
        run: cd promptops-tui && cargo test

      - name: Run CLI Helper Tests
        run: make test

      - name: Verify Prompt Catalog Synchronization
        run: |
          make docs
          if [ -n "$(git status --porcelain docs/catalog/)" ]; then
            echo "::error::Domain catalogs in docs/catalog/ are out of sync with prompt templates!"
            echo "::notice::Please run 'make docs' locally and commit the changes before merging."
            git diff docs/catalog/
            exit 1
          else
            echo "✅ Domain catalogs are up to date."
          fi

  generate-catalog-on-push:
    name: Auto-Generate Catalogs & Tag Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate System Integrity
        run: make validate && make test && make lint

      - name: Determine Next Version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true

      - name: Sync Project Versions
        run: |
          if [ "${{ steps.tag_version.outputs.new_tag }}" != "" ]; then
            python3 scripts/sync_all_versions.py ${{ steps.tag_version.outputs.new_version }}
          fi

      - name: Generate Updated Catalogs
        run: make docs

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if git diff --cached --quiet; then
            echo "✅ No changes to documentation or versions"
          else
            git commit -m "chore: auto-generate catalogs and sync version to ${{ steps.tag_version.outputs.new_version }} [skip ci]"
            git push
            echo "🚀 Pushed updated catalogs and versions to main"
          fi

      - name: Create Git Tag
        if: steps.tag_version.outputs.new_tag != ''
        uses: mathieudutour/github-tag-action@v6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ steps.tag_version.outputs.new_version }}
          tag_prefix: ""
