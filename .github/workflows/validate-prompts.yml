name: CI - PromptOps Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  validate-and-test:
    name: Validate and Test PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Though we have zero dependencies, good practice
          
      - name: Verify Makefile Functionality
        run: make help
          
      - name: Validate Prompt Metadata & Structure
        run: make validate

      - name: Run CLI Helper Tests
        run: make test

      - name: Verify Prompt Catalog Synchronization
        run: |
          make docs
          if [ -n "$(git status --porcelain docs/catalog/)" ]; then
            echo "::error::Domain catalogs in docs/catalog/ are out of sync with prompt templates!"
            echo "::notice::Please run 'make docs' locally and commit the changes before merging."
            git diff docs/catalog/
            exit 1
          else
            echo "✅ Domain catalogs are up to date."
          fi

  generate-catalog-on-push:
    name: Auto-Generate Catalogs on Main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate System Integrity
        run: make validate && make test

      - name: Generate Updated Catalogs
        run: make docs

      - name: Commit and Push Catalog Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/catalog/ README.md GEMINI.md
          if git diff --cached --quiet; then
            echo "✅ No changes to documentation"
          else
            git commit -m "docs: auto-generate domain prompt catalogs [skip ci]"
            git push
            echo "🚀 Pushed updated catalogs to main"
          fi
