name: Release - PromptOps TUI

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release TUI
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: promptops-tui-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: promptops-tui-macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: promptops-tui-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: promptops-tui-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "promptops-tui -> target"

      - name: Build Release Binary
        run: |
          cd promptops-tui
          cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TERM_COLOR: always

      - name: Rename Binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv promptops-tui/target/${{ matrix.target }}/release/promptops-tui.exe ${{ matrix.binary_name }}
          else
            mv promptops-tui/target/${{ matrix.target }}/release/promptops-tui ${{ matrix.binary_name }}
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
