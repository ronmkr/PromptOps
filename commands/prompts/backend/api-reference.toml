- **No Ambiguity**: If a feature is not yet implemented or has specific limitations (e.g., keyword search in collections), state it clearly.

## 📋 Deliverables / Workflows

### Quick Start: Connecting to VideoDB
```python
import videodb

# Initialize connection
conn = videodb.connect(api_key="your-api-key")

# Access default collection
coll = conn.get_collection()
```

### Advanced Workflow: Media Transcoding
```python
from videodb import TranscodeMode, VideoConfig

job_id = conn.transcode(
    source="https://example.com/video.mp4",
    callback_url="https://example.com/webhook",
    mode=TranscodeMode.lightning,
    video_config=VideoConfig(resolution=720, quality=23)
)
```

